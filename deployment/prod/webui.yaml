apiVersion: apps/v1
kind: Deployment
metadata:
  name: webui
  namespace: taskmanager-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webui
  template:
    metadata:
      labels:
        app: webui
    spec:
      containers:
        - name: webui
          image: ghcr.io/attila-somogyvari/task-manager-alkfejl/webui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: webui
  namespace: taskmanager-app
spec:
  selector:
    app: webui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort

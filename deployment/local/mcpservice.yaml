apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcpservice
  namespace: taskmanager-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcpservice
  template:
    metadata:
      labels:
        app: mcpservice
    spec:
      containers:
        - name: mcpservice
          image: task-manager-alkfejl-mcpservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
          envFrom:
            - configMapRef:
                name: taskmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: mcpservice
  namespace: taskmanager-app
spec:
  selector:
    app: mcpservice
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

name: CI - McpService

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ci-mcpservice.yml'
      - 'TaskManager.sln'
      - 'source/Domain/**'
      - 'source/McpService/**'
      - '.dockerignore'
  pull_request:
    paths:
      - '.github/workflows/ci-mcpservice.yml'
      - 'TaskManager.sln'
      - 'source/Domain/**'
      - 'source/McpService/**'
      - '.dockerignore'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/attila-somogyvari/task-manager-alkfejl/mcpservice

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Repository checkout
        uses: actions/checkout@v5

      - name: Docker Buildx beallitasa
        uses: docker/setup-buildx-action@v3

      - name: Bejelentkezes GHCR-be
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata eloallitasa
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: McpService image build es opcionális push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: source/McpService/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

